substitutions:
  _REGION: us-central1
  _AR_REPOSITORY: argusvene
  _IMAGE: web
  _IMAGE_TAG: manual
  _SERVICE: argusvene-demo
  _RUNTIME_SERVICE_ACCOUNT: argusvene-run@argusvene.iam.gserviceaccount.com
  _CLOUD_SQL_INSTANCE: argusvene:us-central1:argusvene-db
  _VITE_FIREBASE_API_KEY: ""
  _VITE_FIREBASE_PROJECT_ID: ""
  _VITE_FIREBASE_APP_ID: ""
  _VITE_DEV_AUTH_BYPASS: "false"

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

steps:
  - name: node:20
    entrypoint: bash
    args:
      - -lc
      - |
        npm ci
        npm run check

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}
      - --build-arg
      - VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - --build-arg
      - VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - --build-arg
      - VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - --build-arg
      - VITE_DEV_AUTH_BYPASS=${_VITE_DEV_AUTH_BYPASS}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --platform=managed
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}
      - --port=8080
      - --cpu=2
      - --memory=2Gi
      - --timeout=900
      - --min-instances=1
      - --max-instances=1
      - --session-affinity
      - --add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}
      - --set-secrets=DATABASE_URL=database-url:latest
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}
