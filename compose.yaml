services:
  postgres:
    image: postgres:16
    container_name: argusvene-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: argusvene
      POSTGRES_USER: argusvene
      POSTGRES_PASSWORD: argusvene
    ports:
      - "5432:5432"
    volumes:
      - argusvene-postgres-data:/var/lib/postgresql/data

volumes:
  argusvene-postgres-data:
